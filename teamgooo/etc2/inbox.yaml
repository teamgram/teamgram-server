Mysql:
  DSN: teamgram:teamgram@tcp(127.0.0.1:3306)/teamgram?charset=utf8mb4&parseTime=true
  Active: 64
  Idle: 64
  IdleTimeout: 4h
Cache:
  - Host: 127.0.0.1:6379
KV:
  - Host: 127.0.0.1:6379
    Type: node
#  - Host: 127.0.0.1:7000
#    Type: cluster
#  - Host: 127.0.0.1:7001
#    Type: cluster
#  - Host: 127.0.0.1:7002
#    Type: cluster

MessageSharding: 8

InboxConsumer:
  Topics:
    - "Inbox-T"
  Brokers:
    - 127.0.0.1:9094
  Group: "Inbox-MainCommunity-S"

IdgenClient:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.idgen
BizServiceClient:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.biz_service

SyncClient:
  Topic:   "Sync-T"
  Brokers:
    - 127.0.0.1:9094
BotSyncClient:
  Topic:   "BotSync-T"
  Brokers:
    - 127.0.0.1:9094
