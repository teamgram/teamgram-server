Name: messenger.inbox
ListenOn: 127.0.0.1:20030
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: messenger.inbox
Timeout: 0
Log:
  ServiceName: messenger.inbox
  Mode: file
  Path: ../logs/inbox
  Level: debug
