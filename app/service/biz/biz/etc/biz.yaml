Name: service.biz_service
ListenOn: 127.0.0.1:20020
Etcd:
  #GoZero: true
  Hosts:
    - 127.0.0.1:2379
  Key: service.biz_service
Log:
  #Mode: file
  #Path: ../logs/biz
  Level: debug

Mysql:
  Addr: 127.0.0.1:3306
  DSN: root:@tcp(127.0.0.1:3306)/teamgram?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai
  Active: 64
  Idle: 64
  IdleTimeout: 4h
  QueryTimeout: 5s
  ExecTimeout: 5s
  TranTimeout: 5s
Cache:
  - Host: "127.0.0.1:6379"
    Type: "node"
    Pass: ""

KV:
  - Host: "127.0.0.1:6379"
    Type: "node"
    Pass: ""

MediaClient:
  DestService: service.media
  ServiceName: RPCMedia
  Codec: zrpc
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.media

IdgenClient:
  DestService: "service.idgen"
  ServiceName: "RPCIdgen"
  Codec: "zrpc"
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.idgen
