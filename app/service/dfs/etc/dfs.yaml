Name: service.dfs
ListenOn: 0.0.0.0:20640
Etcd:
  #GoZero: true
  Hosts:
    - 127.0.0.1:2379
  Key: service.dfs

MiniHttp:
  Name: service.dfs_mini_http
  Host: 0.0.0.0
  Port: 20641
  Log:
    Mode: file
    Path: ../logs/dfs
    Level: debug

Kv:
  - Host: "127.0.0.1:6379"
    Type: "node"
    Pass: ""

Minio:
  Endpoint: 127.0.0.1:9100
  AccessKeyID: minio
  SecretAccessKey: miniostorage
  UseSSL: false
  PhotosBucket: photos
  VideosBucket: videos
  DocumentsBucket: documents
  EncryptedBucket: encryptedfiles

Idgen:
  DestService: service.idgen
  ServiceName: RPCIdgen
  # Codec: zrpc
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.idgen

