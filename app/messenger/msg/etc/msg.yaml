Name: messenger.msg
ListenOn: 0.0.0.0:20380
Etcd:
  #GoZero: true
  Hosts:
    - 127.0.0.1:2379
  Key: messenger.msg
Log:
  Mode: file
  Path: ../logs/msg
  Level: debug

Mysql:
  DSN: "root:@tcp(127.0.0.1:3306)/teamgooo?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai"
  Active: 64
  Idle: 64
  IdleTimeout: 4h

Idgen:
  DestService: service.idgen
  ServiceName: RPCIdgen
  # Codec: zrpc
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.idgen

Userupdates:
  DestService: messenger.userupdates
  ServiceName: RPCUserupdates
  # Codec: zrpc
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: messenger.userupdates

Chat:
  DestService: service.biz_service
  ServiceName: RPCChat
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.biz_service

ReceiverOperations:
  Brokers:
    - 127.0.0.1:9094
  Topic: userupdates.receiver_operations.v1
  ProducerAck: wait_for_all
