Name: bff.bff
ListenOn: 0.0.0.0:20010
Etcd:
  #GoZero: true
  Hosts:
    - 127.0.0.1:2379
  Key: bff.bff
Log:
  Mode: file
  Path: ../logs/bff
  Level: debug

KV:
  - Host: localhost:6379

Code:
  Name: "none"
  SendCodeUrl: ""
  VerifyCodeUrl: ""
  Key: ""
  Secret: ""
  RegionId: ""

BizServiceClient:
  DestService: service.biz_service
  ServiceName: RPCBizservice
  # Codec: zrpc
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.biz_service

AuthSessionClient:
  DestService: service.authsession
  ServiceName: RPCAuthsession
  # Codec: zrpc
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.authsession

MediaClient:
  DestService: service.media
  ServiceName: RPCMedia
  # Codec: zrpc
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.media

IdgenClient:
  DestService: service.idgen
  ServiceName: RPCIdgen
  # Codec: zrpc
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.idgen

MsgClient:
  DestService: messenger.msg
  ServiceName: RPCMsg
  # Codec: zrpc
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: messenger.msg

SyncClient:
  DestService: messenger.sync
  ServiceName: RPCSync
  # Codec: zrpc
  Etcd:
    Hosts:
      - 127.0.0.1:2379
