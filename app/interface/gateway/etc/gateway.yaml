Name: interface.gateway
ListenOn: 0.0.0.0:20110
Etcd:
  #GoZero: true
  Hosts:
    - 127.0.0.1:2379
  Key: interface.gateway
Log:
  Mode: file
  Path: ../logs/gateway
  Level: debug

GatewayId: gateway-dev-1
Transport:
  TCPListenOn: 0.0.0.0:10443

AuthsessionClient:
  DestService: service.authsession
  ServiceName: RPCAuthsession
  # Codec: zrpc
  # ShortConnection: true
  # Endpoints:
  #  - 127.0.0.1:20450
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.authsession

PresenceClient:
  DestService: service.presence
  ServiceName: RPCPresence
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.presence

AdvertiseRpcAddr: 127.0.0.1:20110
PresenceRefreshMinIntervalSeconds: 20
PresenceRefreshScanIntervalSeconds: 10
PresenceRefreshRetryMinIntervalSeconds: 5
GatewayShutdownPresenceOfflineDeadlineSeconds: 5
GatewayShutdownPresenceOfflineMaxSessions: 10000

BffClient:
  Clients:
    - DestService: bff.bff
      # Codec: zrpc
      Etcd:
        Hosts:
          - 127.0.0.1:2379
        Key: bff.bff
      ServiceNameList:
        - RPCAccount
        - RPCAuthorization
        - RPCAutoDownload
        - RPCChatInvites
        - RPCChats
        - RPCConfiguration
        - RPCContacts
        - RPCDialogs
        - RPCDrafts
        - RPCFiles
        - RPCMessages
        - RPCMiscellaneous
        - RPCNotification
        - RPCNsfw
        - RPCPassport
        - RPCPremium
        - RPCPrivacySettings
        - RPCQrCode
        - RPCSavedMessageDialogs
        - RPCSponsoredMessages
        - RPCTos
        - RPCUpdates
        - RPCUserChannelProfiles
        - RPCUsernames
        - RPCUsers
