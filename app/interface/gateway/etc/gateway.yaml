Name: interface.gateway
ListenOn: 0.0.0.0:20110
Etcd:
  #GoZero: true
  Hosts:
    - 127.0.0.1:2379
  Key: interface.gateway
Log:
  #Mode: file
  #Path: ../logs/gateway
  Level: debug

GatewayId: gateway-dev-1
Transport:
  TCPListenOn: 0.0.0.0:10443

AuthsessionClient:
  DestService: service.authsession
  ServiceName: RPCAuthsession
  Codec: zrpc
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: service.authsession

BffClient:
  Clients:
    - DestService: bff.bff
      Codec: zrpc
      Etcd:
        Hosts:
          - 127.0.0.1:2379
        Key: bff.bff
      ServiceNameList:
        - RPCConfiguration
        - RPCAuthorization
        - RPCQrCode
        - RPCDialogs
